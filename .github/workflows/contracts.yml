name: contracts

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: contracts

jobs:
  check:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: test (native, includes real-proof e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
      # The e2e tests generate real Groth16 proofs; dev-profile dependency
      # optimization (workspace Cargo.toml) keeps this tolerable.
      - run: cargo test

  wasm:
    name: wasm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
      - run: cargo build --target wasm32v1-none --release
      - name: report contract sizes
        run: ls -la target/wasm32v1-none/release/*.wasm
